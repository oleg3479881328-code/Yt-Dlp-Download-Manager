<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-dlp Extension Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="ext-shell">
  <div class="ext-card wide">
    <h1>Настройки расширения</h1>
    <div class="grid-two">
      <label class="field">
        <span>Work mode</span>
        <select id="workMode">
          <option value="mini">Mini</option>
          <option value="full">Full</option>
        </select>
      </label>
      <label class="field">
        <span>Default mode</span>
        <select id="defaultMode">
          <option value="video">Video</option>
          <option value="audio">Audio</option>
        </select>
      </label>
    </div>
    <label class="field">
      <span>Quality / format</span>
      <input id="quality" type="text">
    </label>
    <label class="field">
      <span>yt-dlp path</span>
      <input id="ytDlpPath" type="text">
    </label>
    <label class="field">
      <span>ffmpeg path</span>
      <input id="ffmpegPath" type="text">
    </label>
    <label class="field">
      <span>Output directory</span>
      <input id="outputDirectory" type="text">
    </label>
    <label class="field">
      <span>Native host name</span>
      <input id="nativeHostName" type="text">
    </label>
    <label class="field checkbox-field">
      <span>
        <input id="defaultTranscribeAudio" type="checkbox">
        Создавать транскрипт после загрузки
      </span>
    </label>
    <label class="field">
      <span>Язык транскрибации</span>
      <select id="defaultTranscriptionLanguage">
        <option value="auto">Auto detect</option>
        <option value="en">English</option>
        <option value="ru">Russian</option>
      </select>
    </label>
    <label class="field checkbox-field">
      <span>
        <input id="defaultTranscriptSecondMarks" type="checkbox">
        Таймкоды по секундам
      </span>
    </label>
    <div class="actions">
      <button id="save" class="primary">Сохранить</button>
      <button id="probe">Проверить</button>
      <button id="openFolder">Открыть папку</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
