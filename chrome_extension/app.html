<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-dlp Full Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="ext-shell">
  <div class="ext-card wide">
    <div class="header-row">
      <div>
        <h1>yt-dlp Full Mode</h1>
        <p class="muted">Вставьте ссылку вручную или передайте ее из контекстного меню.</p>
      </div>
      <button id="openOptions">Настройки</button>
    </div>
    <label class="field">
      <span>URL</span>
      <input id="url" type="url" placeholder="https://...">
    </label>
    <div class="actions inline">
      <button id="analyze">Анализировать</button>
    </div>
    <section id="preview" class="preview-card hidden"></section>
    <div class="grid-two">
      <label class="field">
        <span>Режим загрузки</span>
        <select id="mode">
          <option value="video">Video</option>
          <option value="audio">Audio</option>
        </select>
      </label>
      <label class="field">
        <span>Качество / format</span>
        <input id="quality" type="text" placeholder="best">
      </label>
    </div>
    <label class="field checkbox-field">
      <span>
        <input id="transcribeAudio" type="checkbox">
        Создать транскрипт (SRT + TXT)
      </span>
    </label>
    <label class="field">
      <span>Язык транскрибации</span>
      <select id="transcriptionLanguage">
        <option value="auto">Auto detect</option>
        <option value="en">English</option>
        <option value="ru">Russian</option>
      </select>
    </label>
    <label class="field checkbox-field">
      <span>
        <input id="transcriptSecondMarks" type="checkbox">
        Таймкоды по секундам
      </span>
    </label>
    <div class="actions">
      <button id="download" class="primary">Скачать</button>
      <button id="probe">Проверить инструменты</button>
      <button id="openFolder">Открыть папку</button>
      <button id="openLastFile">Открыть последний файл</button>
    </div>
    <div id="status" class="status"></div>
    <section>
      <h2>Recent</h2>
      <div id="history" class="history-list"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
